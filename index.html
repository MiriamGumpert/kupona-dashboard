<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mein Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--sun:#F5A623;--flame:#E8522A;--amber:#F7C948;--peach:#FDE8D0;--cream:#FFFBF4;--text:#2D1B00;--muted:#8B6840;--card:#fff;--border:#F0DFC0;--shadow:0 2px 16px rgba(229,130,60,.12)}
  body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;position:relative;background:var(--cream);overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;transition:background .6s ease,opacity .6s ease;background:\n        radial-gradient(ellipse 65% 45% at 18% 22%, var(--blob1, rgba(255,215,110,.15)) 0%, transparent 65%),\n        radial-gradient(ellipse 55% 35% at 82% 12%, var(--blob2, rgba(255,155,60,.08)) 0%, transparent 60%),\n        radial-gradient(ellipse 80% 50% at 52% 88%, var(--blob3, rgba(255,235,180,.05)) 0%, transparent 70%),\n        radial-gradient(ellipse 35% 25% at 90% 66%, var(--blob4, rgba(255,255,255,.03)) 0%, transparent 55%)}
  #starCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.9}
  #notifBanner{position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:340px}
  header,main{position:relative;z-index:2}
  header{background:linear-gradient(120deg,#E8522A 0%,#F5A623 45%,#F7C948 75%,#FFE566 100%);padding:28px 36px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;box-shadow:0 4px 20px rgba(232,82,42,.25)}
  header .brand{display:flex;align-items:center;gap:12px}.logo-wrap{display:flex;align-items:center;gap:10px}
  header .logo{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
  header h1{font-family:'Playfair Display',serif;font-size:1.55rem;color:#fff;letter-spacing:-.3px}
  header .date-pill{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:6px 16px;font-size:.82rem;font-weight:500}
  main{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;padding:28px 32px 48px;max-width:1400px;margin:0 auto}
  .card{background:var(--card);border-radius:18px;padding:24px;border:1.5px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;transition:background .4s ease,border-color .4s ease,color .4s ease}
  .card-title{display:flex;align-items:center;gap:10px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
  .card-title .icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .icon-sun{background:#FEF3C7}.icon-flame{background:#FFE4D6}.icon-amber{background:#FFF8DC}.icon-green{background:#D1FAE5}.icon-blue{background:#DBEAFE}.icon-pink{background:#FCE7F3}
  .focus-block{grid-column:span 2}
  .focus-input{width:100%;border:none;outline:none;font-size:1.45rem;font-family:'Playfair Display',serif;color:var(--text);background:transparent;border-bottom:2.5px solid var(--amber);padding-bottom:6px}
  .focus-input::placeholder{color:#DFCAA8}.focus-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}.tag{font-size:.75rem;padding:4px 12px;border-radius:20px;font-weight:500;cursor:pointer;border:1.5px solid transparent;user-select:none}.tag.active{background:linear-gradient(135deg,#F7C948,#F5A623);color:#3D2000;border-color:#F5A623}.tag.inactive{background:#FFFDE7;color:#92400E;border-color:#F7C948}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi-item{background:linear-gradient(135deg,#FFFDE7 0%,#FFF8C0 100%);border:1.5px solid #F7C948;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;cursor:pointer}.kpi-value{font-size:1.6rem;font-weight:700;color:var(--flame);line-height:1}.kpi-label{font-size:.72rem;color:var(--muted);font-weight:500}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}.cal-day-name{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 0}.cal-day{font-size:.8rem;padding:6px 3px;border-radius:8px;color:var(--text);font-weight:400}.cal-day.today{background:var(--flame);color:#fff;font-weight:700}.cal-day.has-event::after{content:'';display:block;width:4px;height:4px;background:var(--sun);border-radius:50%;margin:2px auto 0}.cal-nav{display:flex;align-items:center;justify-content:space-between;font-size:.85rem;font-weight:600;color:var(--text)}.cal-nav button,.add-btn{background:none;border:1.5px dashed var(--sun);border-radius:10px;padding:8px;font-size:.8rem;color:var(--sun);cursor:pointer;width:100%;font-weight:500}.cal-nav button{width:28px;height:28px;padding:0;border:none;background:#FDE8D0;border-radius:8px}.cal-nav button:hover,.add-btn:hover{background:#FFF8DC}
  .termine-block{grid-column:span 1}.outlook-connect{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;background:linear-gradient(135deg,#FFFDE7,#FFF8C0);border-radius:14px;border:1.5px dashed #F7C948;text-align:center}.outlook-btn{background:linear-gradient(135deg,#0078D4,#005A9E);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;display:flex;align-items:center;gap:8px}
  .asana-block{grid-column:span 1}.asana-token-input,.notes-area{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font:inherit;background:#FFFDF7}.notes-area{min-height:120px;resize:vertical}.asana-btn{background:linear-gradient(135deg,#F7C948,#F5A623);color:#3D2000;border:none;border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif}
  .task-list{display:flex;flex-direction:column;gap:8px}.task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1.5px solid transparent;border-radius:12px}.task-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--sun);background:#fff;flex-shrink:0;margin-top:2px;cursor:pointer}.task-cb.done{background:var(--sun);border-color:var(--sun)}.task-cb.done::after{content:"✓";font-size:.7rem;color:#fff;font-weight:700}.task-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}.task-label{font-size:.85rem;font-weight:500}.task-next-due{font-size:.7rem;color:var(--muted)}.task-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}.task-action-btn{background:none;border:none;font-size:.85rem;cursor:pointer;padding:4px 5px;border-radius:7px;line-height:1}.task-action-btn:hover{background:var(--peach)}.task-action-del:hover{background:#FEE2E2}.task-set-date-btn{background:none;border:1.5px dashed var(--sun);border-radius:8px;font-size:.7rem;color:var(--sun);cursor:pointer;padding:3px 9px;white-space:nowrap;flex-shrink:0}
  .task-item.due-urgent{border-color:#FCA5A5;background:#FFF5F5}.task-item.due-soon{border-color:#FDE68A;background:#FFFBEB}.task-next-due.urgent{color:#DC2626;font-weight:700}.task-next-due.soon{color:#D97706;font-weight:600}.task-next-due.ok{color:#059669}
  .notif-card{position:relative;background:#fff;border-left:5px solid #F7C948;border-radius:14px;padding:14px 18px;box-shadow:0 6px 28px rgba(0,0,0,.15);display:flex;align-items:flex-start;gap:12px;animation:slideIn .35s cubic-bezier(.22,.68,0,1.2)}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}.notif-close{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:1rem;color:#ccc}.notif-close:hover{color:#E8522A}.notif-title{font-size:.85rem;font-weight:700;color:#2D1B00;margin-bottom:2px}.notif-text{font-size:.78rem;color:#8B6840;line-height:1.4}.notif-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
  .edit-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px}.edit-modal{width:min(420px,100%);background:#fff;border-radius:18px;padding:18px 18px 16px;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1.5px solid #F0DFC0}.edit-modal h3{font-size:1rem;margin-bottom:12px}.edit-row{display:flex;gap:8px;align-items:center;margin-top:10px}.edit-input{flex:1;border:1.5px solid #F0DFC0;border-radius:10px;padding:10px 12px;font:inherit;outline:none}.edit-btn{background:linear-gradient(135deg,#F7C948,#F5A623);color:#3D2000;border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.edit-btn.secondary{background:#F5F5F5;color:#555;border:1.5px solid #E5E7EB}
  .star-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.9}
  @media (max-width:900px){main{grid-template-columns:1fr 1fr}.focus-block,.kpi-block,.calendar-block,.termine-block,.tasks-block,.asana-block,.notes-block{grid-column:span 1}}
  @media (max-width:580px){main{grid-template-columns:1fr;padding:16px;gap:14px}header{padding:18px 20px}}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div id="notifBanner"></div>
<div id="editModal" class="edit-modal-backdrop"><div class="edit-modal" id="editModalInner"></div></div>
<header>
  <div class="brand"><div class="logo-wrap"><svg class="logo" viewBox="0 0 200 200" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F4A000"/><stop offset="55%" stop-color="#FF9A00"/><stop offset="100%" stop-color="#D96A00"/></linearGradient></defs><circle cx="100" cy="100" r="95" fill="url(#logoGrad)"/><path d="M98 12 L112 54 L87 58 Z" fill="#fff"/><path d="M145 28 L128 68 L162 63 Z" fill="#fff"/><path d="M175 77 L131 86 L162 103 Z" fill="#fff"/><path d="M145 172 L128 132 L162 137 Z" fill="#fff"/><path d="M98 188 L112 146 L87 142 Z" fill="#fff"/><path d="M25 123 L69 114 L38 97 Z" fill="#fff"/><path d="M35 42 L70 82 L17 95 Z" fill="#fff"/><path d="M90 73 L111 98 L79 122 L60 92 Z" fill="#fff"/></svg></div></div><h1>Mein Dashboard</h1></div>
  <div class="date-pill" id="headerDate"></div>
</header>
<main>
  <div class="card focus-block"><div class="card-title"><div class="icon icon-flame">🎯</div><span class="editable-title" data-key="focus">Tages-Fokus</span></div><input class="focus-input" id="focusInput" placeholder="Was ist mein wichtigstes Ziel heute?" /><div class="focus-tags"><span class="tag active">Dringend</span><span class="tag inactive">Wichtig</span><span class="tag inactive">Planung</span><span class="tag inactive">Meeting</span><span class="tag inactive">Deep Work</span></div></div>
  <div class="card kpi-block"><div class="card-title"><div class="icon icon-amber">📊</div><span class="editable-title" data-key="kpis">Meine KPIs</span></div><div class="kpi-grid" id="kpiGrid"></div></div>
  <div class="card calendar-block"><div class="card-title"><div class="icon icon-sun">📅</div><span class="editable-title" data-key="calendar">Kalender</span></div><div class="cal-nav"><button onclick="changeMonth(-1)">‹</button><span id="calMonthLabel"></span><button onclick="changeMonth(1)">›</button></div><div class="cal-grid" id="calGrid"></div></div>
  <div class="card termine-block"><div class="card-title"><div class="icon icon-pink">🗓️</div><span class="editable-title" data-key="termine">Heutige Termine</span></div><div id="termineList"><div class="outlook-connect"><div style="font-size:2rem">📅</div><p>Verbinde Outlook, um deine heutigen Termine automatisch zu sehen.</p><button class="outlook-btn" onclick="outlookLogin()"><span>🔵</span>Mit Outlook verbinden</button></div></div></div>
  <div class="card tasks-block"><div class="card-title"><div class="icon icon-green">✅</div><span class="editable-title" data-key="tasks">Wiederkehrende Aufgaben</span></div><div class="task-list" id="taskList"></div><button class="add-btn" onclick="addTask()">+ Aufgabe hinzufügen</button></div>
  <div class="card asana-block"><div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap"><div class="card-title"><div class="icon icon-blue">🔗</div><span class="editable-title" data-key="asana">Asana — Meine Aufgaben</span></div><div style="display:flex;gap:8px;align-items:center"><button class="asana-btn" onclick="loadAsanaTasks()" style="padding:8px 14px;font-size:.78rem">Aktualisieren</button><button class="asana-btn" onclick="disconnectAsana()" style="padding:8px 14px;font-size:.78rem;background:transparent;border:1.5px solid #FECACA;color:#B91C1C">Token löschen</button></div></div>
    <div class="asana-token-form" style="display:flex;flex-direction:column;gap:10px"><div class="asana-token-label">Personal Access Token</div><div style="display:flex;gap:10px;align-items:center"><input class="asana-token-input" type="password" id="asanaTokenInput" placeholder="1/1234567890:abcdef..." /><button class="asana-btn" onclick="connectAsana()">Verbinden</button></div><label style="display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted)"><input type="checkbox" id="asanaRemember" checked /> Token merken (nur auf diesem Laptop)</label><div id="asanaStatus" style="font-size:.78rem;color:var(--muted)"></div></div><div id="asanaTasks" style="display:flex;flex-direction:column;gap:8px;margin-top:10px"></div></div>
  <div class="card notes-block"><div class="card-title"><div class="icon icon-amber">📝</div><span class="editable-title" data-key="notes">Schnellnotizen</span></div><textarea class="notes-area" id="notesArea" placeholder="Gedanken, Ideen, To-dos... einfach drauflos schreiben."></textarea><div style="font-size:.72rem;color:var(--muted);text-align:right" id="notesFooter">0 Zeichen</div></div>
</main>
<script>
const state={titles:{focus:'Tages-Fokus',kpis:'Meine KPIs',calendar:'Kalender',termine:'Heutige Termine',tasks:'Wiederkehrende Aufgaben',asana:'Asana — Meine Aufgaben',notes:'Schnellnotizen'},kpis:[{label:'Aufgaben erledigt',value:'87%'},{label:'Offene Asana-Tasks',value:'12'},{label:'Meetings heute',value:'3'},{label:'Bis nächster Review',value:'5d'}],skyMode:'auto'};
const today=new Date();
const dayNames=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function setHeaderDate(){document.getElementById('headerDate').textContent=`${dayNames[today.getDay()]}, ${today.getDate()}. ${monthNames[today.getMonth()]} ${today.getFullYear()}`}
function renderKpis(){const grid=document.getElementById('kpiGrid');grid.innerHTML=state.kpis.map((k,i)=>`<div class="kpi-item" onclick="editKpi(${i})"><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div></div>`).join('')}
function renderCalendar(){const g=document.getElementById('calGrid'),l=document.getElementById('calMonthLabel');const d=new Date(today.getFullYear(),today.getMonth(),1);l.textContent=`${monthNames[d.getMonth()]} ${d.getFullYear()}`;let h=['Mo','Di','Mi','Do','Fr','Sa','So'].map(x=>`<div class="cal-day-name">${x}</div>`).join('');let o=d.getDay()-1;if(o<0)o=6;for(let i=0;i<o;i++)h+=`<div class="cal-day"></div>`;let n=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();for(let i=1;i<=n;i++){const isToday=i===today.getDate();const hasEvent=[3,7,12,18,25].includes(i);h+=`<div class="cal-day${isToday?' today':''}${hasEvent?' has-event':''}">${i}</div>`}g.innerHTML=h}
function changeMonth(dir){today.setMonth(today.getMonth()+dir);renderCalendar()}
function dueInfo(dateStr){if(!dateStr)return{text:'Nächstes Datum setzen',cls:'',urgent:false};const t=new Date();t.setHours(0,0,0,0);const d=new Date(dateStr);d.setHours(0,0,0,0);const diff=Math.round((d-t)/86400000);if(diff<0)return{text:`⚠️ Seit ${Math.abs(diff)}d überfällig!`,cls:'urgent',urgent:true};if(diff===0)return{text:'🔴 Heute fällig!',cls:'urgent',urgent:true};if(diff<=3)return{text:`🟡 In ${diff} Tag${diff===1?'':'en'} fällig`,cls:'soon',urgent:false};return{text:`✅ Nächster Termin: ${d.toLocaleDateString('de-DE')}`,cls:'ok',urgent:false}}
const tasksKey='dashboard_tasks';const defaultTasks=[{id:'t1',label:'📊 Reporting aktualisieren',badge:'badge-weekly',badgeLabel:'wöchentlich',nextDue:'2026-06-27'},{id:'t2',label:'📦 Orderabgleich Magix',badge:'badge-biweekly',badgeLabel:'14-tägig',nextDue:'2026-06-27'},{id:'t3',label:'📦 Orderabgleich Antelope',badge:'badge-biweekly',badgeLabel:'14-tägig',nextDue:'2026-06-27'}];function loadTasks(){try{return JSON.parse(localStorage.getItem(tasksKey)||'null')||defaultTasks.map(x=>({...x}))}catch(e){return defaultTasks.map(x=>({...x}))}}function saveTasks(t){try{localStorage.setItem(tasksKey,JSON.stringify(t))}catch(e){}}
function renderTasks(){const list=document.getElementById('taskList');list.innerHTML='';loadTasks().forEach(task=>{const di=dueInfo(task.nextDue);const div=document.createElement('div');div.className='task-item'+(di.urgent?' due-urgent':di.cls==='soon'?' due-soon':'');div.innerHTML=`<div class="task-cb" onclick="event.stopPropagation();toggleDone('${task.id}')"></div><div class="task-meta"><div class="task-label">${task.label}</div><div class="task-next-due ${di.cls}">${di.text}</div></div><span class="task-badge ${task.badge}">${task.badgeLabel}</span><div class="task-actions"><button class="task-set-date-btn" onclick="setNextDue('${task.id}')">📅 Datum</button><button class="task-action-btn" onclick="editTask('${task.id}')">✏️</button><button class="task-action-btn" onclick="copyTask('${task.id}')">📋</button><button class="task-action-btn task-action-del" onclick="deleteTask('${task.id}')">🗑️</button></div>`;list.appendChild(div)})}
function setNextDue(id){const tasks=loadTasks();const t=tasks.find(x=>x.id===id);if(!t)return;openEditModal('Nächstes Datum',t.nextDue||'',v=>{t.nextDue=v;saveTasks(tasks);renderTasks()},{placeholder:'YYYY-MM-DD'})}
function editTask(id){const tasks=loadTasks();const t=tasks.find(x=>x.id===id);if(!t)return;openEditModal('Aufgabe bearbeiten',t.label,v=>{t.label=v;saveTasks(tasks);renderTasks()},{placeholder:'Text ändern'})}
function copyTask(id){const tasks=loadTasks();const t=tasks.find(x=>x.id===id);if(!t)return;tasks.push({id:'t'+Date.now(),label:t.label+' (Kopie)',badge:t.badge,badgeLabel:t.badgeLabel,nextDue:t.nextDue});saveTasks(tasks);renderTasks()}
function deleteTask(id){if(!confirm('Aufgabe wirklich löschen?'))return;saveTasks(loadTasks().filter(x=>x.id!==id));renderTasks()}
function addTask(){openEditModal('Neue Aufgabe','',v=>{const tasks=loadTasks();tasks.push({id:'t'+Date.now(),label:v,badge:'badge-weekly',badgeLabel:'wöchentlich',nextDue:''});saveTasks(tasks);renderTasks()},{placeholder:'z.B. Orderabgleich Kunde'})}
function toggleDone(id){const list=loadTasks();const t=list.find(x=>x.id===id);if(!t)return;const d=new Date();d.setDate(d.getDate()+(t.badgeLabel==='14-tägig'?14:7));t.nextDue=d.toISOString().slice(0,10);saveTasks(list);renderTasks()}
function openEditModal(title,value,onSave,opts={}){const b=document.getElementById('editModal'),i=document.getElementById('editModalInner');i.innerHTML=`<h3>${title}</h3><div style="font-size:.78rem;color:var(--muted)">${opts.hint||''}</div><div class="edit-row"><input id="editInput" class="edit-input" placeholder="${opts.placeholder||''}" value="${String(value||'').replaceAll('"','&quot;')}"><button class="edit-btn" id="saveEditBtn">Speichern</button><button class="edit-btn secondary" id="cancelEditBtn">Abbrechen</button></div>`;b.style.display='flex';const close=()=>b.style.display='none';document.getElementById('saveEditBtn').onclick=()=>{const v=document.getElementById('editInput').value.trim();if(!v)return;onSave(v);close()};document.getElementById('cancelEditBtn').onclick=close;b.onclick=e=>{if(e.target===b)close()};setTimeout(()=>document.getElementById('editInput').focus(),30)}
function saveNotes(){document.getElementById('notesFooter').textContent=`${document.getElementById('notesArea').value.length} Zeichen`}document.getElementById('notesArea').addEventListener('input',saveNotes);
function showNotification(title,text){const d=document.createElement('div');d.className='notif-card';d.innerHTML=`<div class="notif-icon">🔔</div><div><div class="notif-title">${title}</div><div class="notif-text">${text}</div></div><button class="notif-close" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('notifBanner').appendChild(d);setTimeout(()=>d.remove(),12000)}

// Live Asana
let asanaToken='';let asanaWorkspaces=[];let asanaTasks=[];
function setAsanaStatus(msg){const el=document.getElementById('asanaStatus');if(el)el.textContent=msg}
function loadSavedAsanaToken(){try{const saved=localStorage.getItem('asana_token');if(saved){asanaToken=saved;const inp=document.getElementById('asanaTokenInput');if(inp)inp.value=saved;setAsanaStatus('Token geladen. Verbinde…');connectAsana(true)}}catch(e){}}
async function asanaFetch(path,opts={}){const res=await fetch('https://app.asana.com/api/1.0'+path,{...opts,headers:{'Authorization':'Bearer '+asanaToken,'Accept':'application/json',...(opts.headers||{})}});const text=await res.text();let data;try{data=JSON.parse(text)}catch(e){data={raw:text}};if(!res.ok){throw new Error(data?.errors?.[0]?.message||('HTTP '+res.status))}return data}
async function connectAsana(silent=false){const inp=document.getElementById('asanaTokenInput');const remember=document.getElementById('asanaRemember');if(inp)asanaToken=(inp.value||'').trim();if(!asanaToken){setAsanaStatus('Bitte Token eingeben.');return}setAsanaStatus('Verbinde mit Asana…');try{const me=await asanaFetch('/users/me?opt_fields=name,workspaces');asanaWorkspaces=me.data.workspaces||[];if(remember&&remember.checked){try{localStorage.setItem('asana_token',asanaToken)}catch(e){}}setAsanaStatus('Verbunden als '+(me.data.name||'du')+'. Lade Aufgaben…');await loadAsanaTasks()}catch(e){setAsanaStatus('Fehler: '+e.message+' (Wenn Asana blockiert, brauchst du deine CORS-Extension.)')}}
async function loadAsanaTasks(){if(!asanaToken){setAsanaStatus('Kein Token.');return}setAsanaStatus('Lade Aufgaben…');try{if(!asanaWorkspaces.length){const me=await asanaFetch('/users/me?opt_fields=name,workspaces');asanaWorkspaces=me.data.workspaces||[]}const all=[];for(const ws of asanaWorkspaces){const t=await asanaFetch(`/tasks?assignee=me&workspace=${ws.gid}&completed_since=now&limit=50&opt_fields=name,due_on,projects.name,permalink_url`);all.push(...(t.data||[]))}all.sort((a,b)=>{const da=a.due_on?new Date(a.due_on):new Date('9999-12-31');const db=b.due_on?new Date(b.due_on):new Date('9999-12-31');return da-db});asanaTasks=all;renderAsanaTasks();setAsanaStatus('Aktualisiert: '+asanaTasks.length+' Aufgaben')}catch(e){setAsanaStatus('Fehler beim Laden: '+e.message)}}
function renderAsanaTasks(){const wrap=document.getElementById('asanaTasks');if(!wrap)return;if(!asanaTasks.length){wrap.innerHTML='<div style="font-size:.82rem;color:var(--muted);padding:10px 0">Keine offenen Aufgaben gefunden.</div>';return}const colors=['#0078D4','#F5A623','#F7C948','#059669','#7C3AED','#E8522A'];wrap.innerHTML=asanaTasks.slice(0,12).map((t,i)=>{const due=t.due_on?new Date(t.due_on).toLocaleDateString('de-DE'):'—';const proj=(t.projects&&t.projects[0]&&t.projects[0].name)?t.projects[0].name:'—';const dot=colors[i%colors.length];return `<div class="asana-task-row" onclick="window.open('${t.permalink_url}','_blank')"><div class="asana-dot" style="background:${dot}"></div><div style="flex:1;min-width:0"><div class="asana-task-name">${t.name}</div><div class="asana-task-meta">📁 ${proj} · 📅 ${due}</div></div><span class="asana-pill">Asana</span></div>`}).join('')}
function disconnectAsana(){asanaToken='';asanaWorkspaces=[];asanaTasks=[];try{localStorage.removeItem('asana_token')}catch(e){}const inp=document.getElementById('asanaTokenInput');if(inp)inp.value='';const wrap=document.getElementById('asanaTasks');if(wrap)wrap.innerHTML='';setAsanaStatus('Token gelöscht.');}

// Outlook OAuth PKCE no library
const MS_CLIENT_ID='2d2c3217-be7c-42a1-8541-2f41406859a0';const MS_TENANT='6f55c80c-e11d-4f70-a981-2c5e3b375f13';const MS_REDIRECT='https://miriamgumpert.github.io/kupona-dashboard/';const MS_SCOPES='User.Read Calendars.Read';let outlookToken=null;async function sha256(p){const e=new TextEncoder().encode(p);const h=await crypto.subtle.digest('SHA-256',e);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}function rs(l){const a=new Uint8Array(l);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/[+/=]/g,'').slice(0,l)}async function outlookLogin(){const v=rs(64),c=await sha256(v),s=rs(16);sessionStorage.setItem('pkce_verifier',v);sessionStorage.setItem('pkce_state',s);const p=new URLSearchParams({client_id:MS_CLIENT_ID,response_type:'code',redirect_uri:MS_REDIRECT,scope:MS_SCOPES+' offline_access',state:s,code_challenge:c,code_challenge_method:'S256',response_mode:'query'});window.location.href=`https://login.microsoftonline.com/${MS_TENANT}/oauth2/v2.0/authorize?${p}`}async function handleOAuthCallback(){const p=new URLSearchParams(location.search);const code=p.get('code'),state=p.get('state'),error=p.get('error');if(error){console.error(error,p.get('error_description'));return}if(!code)return;if(state!==sessionStorage.getItem('pkce_state')){console.error('state mismatch');return}const body=new URLSearchParams({client_id:MS_CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:MS_REDIRECT,code_verifier:sessionStorage.getItem('pkce_verifier')});const res=await fetch(`https://login.microsoftonline.com/${MS_TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});const data=await res.json();if(data.access_token){outlookToken=data.access_token;sessionStorage.setItem('ms_token',outlookToken);loadOutlookEvents()}else console.error(data)}async function loadOutlookEvents(){if(!outlookToken)return;const list=document.getElementById('termineList');list.innerHTML='<div class="outlook-connect"><div style="font-size:2rem">⏳</div><p>Termine werden geladen…</p></div>';try{const now=new Date();const start=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0).toISOString();const end=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();const res=await fetch(`https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${start}&endDateTime=${end}&$orderby=start/dateTime&$select=subject,start,end,location,onlineMeeting,isAllDay&$top=20`,{headers:{Authorization:'Bearer '+outlookToken}});const data=await res.json();const events=(data.value||[]).filter(e=>!e.isAllDay);const me=await (await fetch('https://graph.microsoft.com/v1.0/me?$select=displayName',{headers:{Authorization:'Bearer '+outlookToken}})).json();const headerBtn=document.getElementById('outlookHeaderBtn');if(headerBtn)headerBtn.innerHTML=`<span class="outlook-user-pill">👤 ${me.displayName||''}</span><button class="outlook-disconnect-btn" onclick="outlookDisconnect()" style="margin-left:6px;">Trennen</button>`;if(!events.length){list.innerHTML='<div class="outlook-connect"><div style="font-size:2rem">🎉</div><p>Heute keine Termine!</p></div>';return}const colors=['#0078D4','#F5A623','#F7C948','#059669','#7C3AED','#E8522A'];let html='';events.forEach((ev,i)=>{const s=new Date(ev.start.dateTime||ev.start.date);const time=s.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});let loc='';if(ev.onlineMeeting?.joinUrl)loc=`<div class="termin-location"><a href="${ev.onlineMeeting.joinUrl}" target="_blank">🔗 Online-Meeting öffnen</a></div>`;else if(ev.location?.displayName)loc=`<div class="termin-location">📍 ${ev.location.displayName}</div>`;html+=`<div class="task-item"><div class="task-cb" style="border-color:${colors[i%colors.length]};background:${colors[i%colors.length]}"></div><div class="task-meta"><div class="task-label">${ev.subject||'(kein Titel)'}</div><div class="task-next-due ok">${time}</div>${loc}</div></div>`});list.innerHTML=html}catch(e){list.innerHTML=`<div class="outlook-connect"><p>❌ Fehler: ${e.message}</p></div>`;console.error(e)}}function outlookDisconnect(){outlookToken=null;sessionStorage.removeItem('ms_token');document.getElementById('termineList').innerHTML=`<div class="outlook-connect"><div style="font-size:2rem">📅</div><p>Verbinde Outlook, um deine heutigen Termine automatisch zu sehen.</p><button class="outlook-btn" onclick="outlookLogin()"><span>🔵</span>Mit Outlook verbinden</button></div>`;document.getElementById('outlookHeaderBtn').innerHTML=''}

function editTitle(key){openEditModal('Bereich umbenennen',state.titles[key]||'',v=>{state.titles[key]=v;saveState();renderTitles()},{placeholder:'Neuer Name'})}
function renderTitles(){document.querySelectorAll('.editable-title').forEach(el=>{el.textContent=state.titles[el.dataset.key]||el.textContent;el.onclick=()=>editTitle(el.dataset.key);el.title='Klicken zum Umbenennen'})}
function editKpi(i){const k=state.kpis[i];openEditModal('KPI bearbeiten',k.value,v=>{k.value=v;saveState();renderKpis()},{placeholder:'Wert',hint:'Du kannst hier auch andere Zahlen / Texte eintragen.'})}
function saveState(){try{localStorage.setItem('kupona_state',JSON.stringify(state))}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem('kupona_state')||'null');if(s){Object.assign(state,s)}}catch(e){}}

function openEditModal(title,value,onSave,opts={}){const b=document.getElementById('editModal'),i=document.getElementById('editModalInner');i.innerHTML=`<h3>${title}</h3><div style="font-size:.78rem;color:var(--muted)">${opts.hint||''}</div><div class="edit-row"><input id="editInput" class="edit-input" placeholder="${opts.placeholder||''}" value="${String(value||'').replaceAll('"','&quot;')}"><button class="edit-btn" id="saveEditBtn">Speichern</button><button class="edit-btn secondary" id="cancelEditBtn">Abbrechen</button></div>`;b.style.display='flex';const close=()=>b.style.display='none';document.getElementById('saveEditBtn').onclick=()=>{const v=document.getElementById('editInput').value.trim();if(!v)return;onSave(v);close()};document.getElementById('cancelEditBtn').onclick=close;b.onclick=e=>{if(e.target===b)close()};setTimeout(()=>document.getElementById('editInput').focus(),30)}
function showNotification(title,text){const d=document.createElement('div');d.className='notif-card';d.innerHTML=`<div class="notif-icon">🔔</div><div><div class="notif-title">${title}</div><div class="notif-text">${text}</div></div><button class="notif-close" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('notifBanner').appendChild(d);setTimeout(()=>d.remove(),12000)}
function renderBackground(){const h=new Date().getHours();let bg,blob1,blob2,blob3,blob4,star='#F7C948';if(h<7){bg='linear-gradient(180deg,#0C1730 0%,#182D4E 100%)';blob1='rgba(116,145,255,.10)';blob2='rgba(255,145,110,.06)';blob3='rgba(255,220,140,.03)';blob4='rgba(255,255,255,.02)';star='#FFD98A'}else if(h<9){bg='linear-gradient(180deg,#FFF8EE 0%,#FFDFA7 100%)';blob1='rgba(255,215,110,.22)';blob2='rgba(255,155,60,.10)';blob3='rgba(255,255,255,.07)';blob4='rgba(255,235,180,.08)';star='#F7C948'}else if(h<14){bg='linear-gradient(180deg,#FFF6E1 0%,#FFE7AE 100%)';blob1='rgba(255,210,95,.16)';blob2='rgba(255,180,60,.08)';blob3='rgba(255,140,50,.06)';blob4='rgba(255,255,255,.05)';star='#F7C948'}else if(h<16){bg='linear-gradient(180deg,#FFF0D0 0%,#FFD47B 100%)';blob1='rgba(255,180,60,.16)';blob2='rgba(255,120,40,.10)';blob3='rgba(255,215,120,.10)';blob4='rgba(255,255,255,.04)';star='#FFE08C'}else if(h<17){bg='linear-gradient(180deg,#F6C26F 0%,#D47A33 100%)';blob1='rgba(255,132,48,.18)';blob2='rgba(120,35,20,.12)';blob3='rgba(255,220,120,.07)';blob4='rgba(255,255,255,.03)';star='#FFE3A6'}else{bg='linear-gradient(180deg,#08111F 0%,#111827 100%)';blob1='rgba(88,125,255,.10)';blob2='rgba(255,130,80,.07)';blob3='rgba(255,255,255,.04)';blob4='rgba(255,220,120,.04)';star='#FFD27A'}document.body.style.background=bg;document.body.style.setProperty('--star-color',star);document.body.style.setProperty('--blob1',blob1);document.body.style.setProperty('--blob2',blob2);document.body.style.setProperty('--blob3',blob3);document.body.style.setProperty('--blob4',blob4)}
(function(){const c=document.getElementById('starCanvas'),x=c.getContext('2d');function resize(){c.width=innerWidth;c.height=innerHeight}resize();addEventListener('resize',resize);function rnd(a,b){return a+Math.random()*(b-a)}const stars=Array.from({length:92},()=>{const big=Math.random()<.22;const twinkle=Math.random()<.55;const o={x:Math.random(),y:Math.random(),size:big?rnd(8,18):rnd(1.1,8.5),points:Math.random()<.65?4:5,opacity:big?rnd(.07,.22):rnd(.08,.52),speed:big?rnd(.00002,.00014):rnd(.00005,.00055),phase:Math.random()*Math.PI*2,rotate:Math.random()*Math.PI*2,rotSpeed:rnd(-.01,.01),twinkle:twinkle?rnd(.01,.035):rnd(.002,.015),drift:rnd(-.00008,.00008),color:Math.random()<.5?'#F7C948':'#FFE566'};return o});function draw(cx,cy,points,outer,inner,angle,color,opacity){x.save();x.globalAlpha=opacity;x.translate(cx,cy);x.rotate(angle);x.beginPath();for(let i=0;i<points*2;i++){const r=i%2===0?outer:inner,a=i*Math.PI/points;i===0?x.moveTo(Math.cos(a)*r,Math.sin(a)*r):x.lineTo(Math.cos(a)*r,Math.sin(a)*r)}x.closePath();x.fillStyle=color;x.fill();x.restore()}let t=0;function anim(){x.clearRect(0,0,c.width,c.height);t++;stars.forEach(s=>{s.y-=s.speed;s.x+=s.drift;if(s.y<-0.06)s.y=1.06;if(s.x<-0.08)s.x=1.08;if(s.x>1.08)s.x=-0.08;s.rotate+=s.rotSpeed;const tw=s.opacity*(.74+.26*Math.sin(t*s.twinkle+s.phase));const flicker=(Math.sin(t*.035+s.phase)*.5+.5);const outer=s.size*(1+.08*flicker*(s.size>10?.7:.35));draw(s.x*c.width,s.y*c.height,s.points,outer,outer*(s.points===4?.38:.42),s.rotate,s.color,tw)});requestAnimationFrame(anim)}anim()})();
function init(){loadState();setHeaderDate();renderTitles();renderKpis();renderCalendar();renderTasks();saveNotes();renderBackground();showNotification('Erinnerung: 📊 Reporting aktualisieren','Wiederkehrende Aufgabe · Bitte heute erledigen!');showNotification('Erinnerung: 📦 Orderabgleich Magix','Wiederkehrende Aufgabe · Bitte heute erledigen!');showNotification('Erinnerung: 📦 Orderabgleich Antelope','Wiederkehrende Aufgabe · Bitte heute erledigen!');loadSavedAsanaToken();if(location.search.includes('code='))handleOAuthCallback();const s=sessionStorage.getItem('ms_token');if(s){outlookToken=s;loadOutlookEvents()} }
window.addEventListener('DOMContentLoaded',init);
setInterval(renderBackground,60000);
window.addEventListener('resize',renderBackground);
</script>
