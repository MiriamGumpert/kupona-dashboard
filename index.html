<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mein Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun:    #F5A623;
    --flame:  #E8522A;
    --amber:  #F7C948;
    --peach:  #FDE8D0;
    --cream:  #FFFBF4;
    --text:   #2D1B00;
    --muted:  #8B6840;
    --card:   #FFFFFF;
    --border: #F0DFC0;
    --shadow: 0 2px 16px rgba(229,130,60,.12);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(247,201,72,.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 85% 10%, rgba(232,82,42,.10) 0%, transparent 65%),
      radial-gradient(ellipse 80% 50% at 50% 90%, rgba(245,166,35,.13) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 90% 70%, rgba(255,220,100,.10) 0%, transparent 60%);
    animation: bgShift 18s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { opacity: 1; transform: scale(1) translateY(0px); }
    50%  { opacity: .85; transform: scale(1.04) translateY(-12px); }
    100% { opacity: 1; transform: scale(1) translateY(0px); }
  }
  main { position: relative; z-index: 3; }
  header { position: sticky; top: 0; z-index: 100; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(120deg, #E8522A 0%, #F5A623 45%, #F7C948 75%, #FFE566 100%);
    padding: 28px 36px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(232,82,42,.25);
  }
  header .brand { display: flex; align-items: center; gap: 12px; }
  header .logo {
    width: 40px; height: 40px;
    background: rgba(255,255,255,.25);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    color: #fff;
    letter-spacing: -.3px;
  }
  header .date-pill {
    background: rgba(255,255,255,.2);
    color: #fff;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: .82rem;
    font-weight: 500;
    letter-spacing: .3px;
  }

  /* ── GRID ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 20px;
    padding: 28px 32px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .card-title .icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .icon-sun    { background: #FEF3C7; }
  .icon-flame  { background: #FFE4D6; }
  .icon-amber  { background: #FFF8DC; }
  .icon-green  { background: #D1FAE5; }
  .icon-blue   { background: #DBEAFE; }
  .icon-pink   { background: #FCE7F3; }

  /* ── FOCUS BLOCK (col-span 2) ── */
  .focus-block { grid-column: span 2; }
  .focus-input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 1.45rem;
    font-family: 'Playfair Display', serif;
    color: var(--text);
    background: transparent;
    border-bottom: 2.5px solid var(--amber);
    padding-bottom: 6px;
  }
  .focus-input::placeholder { color: #DFCAA8; }
  .focus-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .tag {
    font-size: .75rem;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .18s;
  }
  .tag.active   { background: linear-gradient(135deg,#F7C948,#F5A623); color: #3D2000; border-color: #F5A623; }
  .tag.inactive { background: #FFFDE7; color: #92400E; border-color: #F7C948; }
  .tag:hover { opacity: .85; }

  /* ── KPI BLOCK ── */
  .kpi-block { grid-column: span 1; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi-item {
    background: linear-gradient(135deg, #FFFDE7 0%, #FFF8C0 100%);
    border: 1.5px solid #F7C948;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .kpi-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--flame);
    line-height: 1;
  }
  .kpi-label {
    font-size: .72rem;
    color: var(--muted);
    font-weight: 500;
  }
  .kpi-edit {
    background: none;
    border: none;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--flame);
    width: 100%;
    outline: none;
    padding: 0;
    font-family: 'Inter', sans-serif;
    cursor: text;
  }

  /* ── CALENDAR ── */
  .calendar-block { grid-column: span 1; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }
  .cal-day-name {
    font-size: .65rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    padding: 4px 0;
  }
  .cal-day {
    font-size: .8rem;
    padding: 6px 3px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    color: var(--text);
    font-weight: 400;
  }
  .cal-day:hover { background: var(--peach); }
  .cal-day.today {
    background: var(--flame);
    color: #fff;
    font-weight: 700;
  }
  .cal-day.has-event::after {
    content: '';
    display: block;
    width: 4px; height: 4px;
    background: var(--sun);
    border-radius: 50%;
    margin: 2px auto 0;
  }
  .cal-day.empty { cursor: default; }
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: .85rem;
    font-weight: 600;
    color: var(--text);
  }
  .cal-nav button {
    background: var(--peach);
    border: none;
    border-radius: 8px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--flame);
    transition: background .15s;
  }
  .cal-nav button:hover { background: #F8C5A8; }

  /* ── TERMINE ── */
  .termine-block { grid-column: span 1; }
  .termine-list { display: flex; flex-direction: column; gap: 8px; }
  .termin-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #FFFDE7, #FFF8C0);
    border: 1.5px solid #F7C948;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .termin-item:hover { background: #FFF3A0; border-color: #F5A623; }
  .termin-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .termin-time { font-size: .72rem; font-weight: 600; color: var(--muted); min-width: 38px; }
  .termin-name { font-size: .85rem; font-weight: 500; color: var(--text); flex: 1; }
  .add-btn {
    background: none;
    border: 1.5px dashed var(--sun);
    border-radius: 10px;
    padding: 8px;
    font-size: .8rem;
    color: var(--sun);
    cursor: pointer;
    width: 100%;
    transition: background .15s;
    font-weight: 500;
  }
  .add-btn:hover { background: #FFF8DC; }

  /* ── TASKS ── */
  .tasks-block { grid-column: span 1; }
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-radius: 12px;
    transition: background .15s;
    border: 1.5px solid transparent;
  }
  .task-item:hover { background: var(--peach); }
  .task-item.due-urgent { border-color: #FCA5A5 !important; background: #FFF5F5 !important; }
  .task-item.due-soon   { border-color: #FDE68A !important; background: #FFFBEB !important; }
  .task-cb {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid var(--sun);
    background: #fff;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s;
  }
  .task-cb.done { background: var(--sun); border-color: var(--sun); }
  .task-cb.done::after { content: "✓"; font-size: .7rem; color: #fff; font-weight: 700; }
  .task-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .task-label { font-size: .85rem; font-weight: 500; transition: color .18s; }
  .task-label.done { text-decoration: line-through; color: var(--muted); }
  .task-next-due {
    font-size: .7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .task-next-due.urgent { color: #DC2626; font-weight: 700; }
  .task-next-due.soon   { color: #D97706; font-weight: 600; }
  .task-next-due.ok     { color: #059669; }
  .task-badge {
    font-size: .65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .5px;
    flex-shrink: 0;
  }
  .badge-daily    { background: #FEF3C7; color: #92400E; }
  .badge-weekly   { background: #DBEAFE; color: #1E40AF; }
  .badge-biweekly { background: #EDE9FE; color: #5B21B6; }

  .task-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .task-action-btn {
    background: none;
    border: none;
    font-size: .85rem;
    cursor: pointer;
    padding: 4px 5px;
    border-radius: 7px;
    transition: background .15s;
    line-height: 1;
  }
  .task-action-btn:hover { background: var(--peach); }
  .task-action-del:hover { background: #FEE2E2; }

  .task-set-date-btn {
    background: none;
    border: 1.5px dashed var(--sun);
    border-radius: 8px;
    font-size: .7rem;
    color: var(--sun);
    cursor: pointer;
    padding: 3px 9px;
    white-space: nowrap;
    transition: background .15s;
    flex-shrink: 0;
    font-family: "Inter", sans-serif;
  }
  .task-set-date-btn:hover { background: #FFF8DC; }

  /* ── ASANA ── */
  .asana-block { grid-column: span 2; }
  .asana-token-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .asana-token-label {
    font-size: .8rem;
    font-weight: 600;
    color: var(--muted);
  }
  .asana-token-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .asana-token-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .85rem;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    outline: none;
    background: #FFFDF7;
    transition: border-color .18s;
  }
  .asana-token-input:focus { border-color: var(--sun); }
  .asana-btn {
    background: linear-gradient(135deg, #F7C948, #F5A623);
    color: #3D2000;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .asana-btn:hover { opacity: .88; }
  .asana-btn:disabled { opacity: .5; cursor: not-allowed; }
  .asana-hint {
    font-size: .73rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .asana-hint a { color: var(--flame); text-decoration: none; }
  .asana-hint a:hover { text-decoration: underline; }
  .asana-status {
    font-size: .78rem;
    padding: 8px 14px;
    border-radius: 8px;
    display: none;
  }
  .asana-status.ok  { background: #D1FAE5; color: #065F46; display: block; }
  .asana-status.err { background: #FEE2E2; color: #991B1B; display: block; }
  .asana-status.loading { background: #FEF3C7; color: #92400E; display: block; }

  .asana-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .asana-filter-select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: .78rem;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: #FFFDF7;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 120px;
  }
  .asana-refresh-btn {
    background: var(--peach);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: .78rem;
    font-weight: 600;
    color: var(--flame);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background .15s;
  }
  .asana-refresh-btn:hover { background: #F8C5A8; }
  .asana-disconnect-btn {
    background: none;
    border: 1.5px solid #FECACA;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: .78rem;
    font-weight: 600;
    color: #DC2626;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background .15s;
  }
  .asana-disconnect-btn:hover { background: #FEE2E2; }

  .asana-tasks-grid {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 340px;
    overflow-y: auto;
  }
  .asana-tasks-grid::-webkit-scrollbar { width: 5px; }
  .asana-tasks-grid::-webkit-scrollbar-track { background: transparent; }
  .asana-tasks-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .asana-task {
    display: grid;
    grid-template-columns: 8px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--peach);
    border-radius: 10px;
    font-size: .83rem;
    transition: background .15s;
    cursor: pointer;
    border-left: 3px solid transparent;
  }
  .asana-task:hover { background: #F8C5A8; }
  .asana-task.overdue { border-left-color: var(--flame); background: #FFF0EC; }
  .asana-task.overdue:hover { background: #FFE4D6; }
  .asana-task .priority {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-high   { background: var(--flame); }
  .p-medium { background: var(--sun); }
  .p-low    { background: #86EFAC; }
  .p-none   { background: #D1D5DB; }
  .asana-task-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .asana-task-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asana-task-project { font-size: .7rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asana-task-due {
    font-size: .7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .due-ok       { background: #D1FAE5; color: #065F46; }
  .due-soon     { background: #FEF3C7; color: #92400E; }
  .due-overdue  { background: #FEE2E2; color: #991B1B; }
  .due-none     { background: var(--border); color: var(--muted); }
  .asana-task-complete-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--sun);
    background: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .18s;
    font-size: .7rem;
  }
  .asana-task-complete-btn:hover { background: var(--sun); color: #fff; border-color: var(--sun); }

  .asana-empty {
    text-align: center;
    padding: 28px 20px;
    color: var(--muted);
    font-size: .83rem;
    line-height: 1.6;
  }
  .asana-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .asana-stat {
    background: linear-gradient(135deg, #FFFDE7, #FFF8C0);
    border: 1.5px solid #F7C948;
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 80px;
    text-align: center;
  }
  .asana-stat-val { font-size: 1.3rem; font-weight: 700; color: var(--flame); }
  .asana-stat-lbl { font-size: .68rem; color: var(--muted); font-weight: 500; }

  /* ── NOTES ── */
  .notes-block { grid-column: span 1; }
  .notes-area {
    width: 100%;
    min-height: 130px;
    border: none;
    outline: none;
    background: #FFFDF7;
    border-radius: 12px;
    padding: 14px;
    font-size: .85rem;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    resize: vertical;
    line-height: 1.7;
    border: 1.5px solid var(--border);
  }
  .notes-area::placeholder { color: #DDD0BA; }
  .notes-footer { font-size: .72rem; color: var(--muted); text-align: right; }



  /* ── OUTLOOK ── */
  .outlook-connect {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px;
    background: linear-gradient(135deg, #FFFDE7, #FFF8C0);
    border-radius: 14px;
    border: 1.5px dashed #F7C948;
    text-align: center;
  }
  .outlook-connect p { font-size: .82rem; color: var(--muted); line-height: 1.5; }
  .outlook-btn {
    background: linear-gradient(135deg, #0078D4, #005A9E);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity .18s;
  }
  .outlook-btn:hover { opacity: .88; }
  .outlook-disconnect-btn {
    background: none;
    border: 1.5px solid #FECACA;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: .75rem;
    font-weight: 600;
    color: #DC2626;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background .15s;
  }
  .outlook-disconnect-btn:hover { background: #FEE2E2; }
  .termin-list-inner { display: flex; flex-direction: column; gap: 8px; }
  .termin-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #FFFDE7, #FFF8C0);
    border: 1.5px solid #F7C948;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .termin-item:hover { background: #FFF3A0; }
  .termin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .termin-time { font-size: .72rem; font-weight: 700; color: var(--muted); min-width: 42px; padding-top: 1px; }
  .termin-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .termin-name { font-size: .85rem; font-weight: 600; color: var(--text); }
  .termin-location { font-size: .72rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .termin-location a { color: #0078D4; text-decoration: none; }
  .termin-location a:hover { text-decoration: underline; }
  .termine-empty { text-align: center; padding: 20px; font-size: .83rem; color: var(--muted); }
  .outlook-user-pill {
    font-size: .72rem;
    background: #EFF6FF;
    color: #1D4ED8;
    border-radius: 20px;
    padding: 4px 10px;
    font-weight: 500;
  }

  /* ── NOTIFICATION BANNER ── */
  #notifBanner {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 340px;
  }
  .notif-card {
    background: #fff;
    border-left: 5px solid #F7C948;

(function() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Generate stars
  const STAR_COUNT = 45;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x:       Math.random(),
    y:       Math.random(),
    size:    4 + Math.random() * 14,
    points:  Math.random() < .7 ? 4 : 5,          // mix of 4- and 5-pointed
    opacity: .18 + Math.random() * .32,
    speed:   .00008 + Math.random() * .00014,
    phase:   Math.random() * Math.PI * 2,
    rotate:  Math.random() * Math.PI * 2,
    rotSpeed:(Math.random() - .5) * .004,
    color:   Math.random() < .6 ? '#F7C948' : (Math.random() < .5 ? '#F5A623' : '#FFE566'),
  }));

  function drawStar(cx, cy, points, outer, inner, angle, color, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outer : inner;
      const a = (i * Math.PI) / points;
      i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
              : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  let t = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 1;
    stars.forEach(s => {
      // gentle float upward, wrap around
      s.y -= s.speed;
      if (s.y < -0.05) s.y = 1.05;
      s.rotate += s.rotSpeed;

      const pulse = s.opacity * (.8 + .2 * Math.sin(t * .018 + s.phase));
      const inner = s.size * (s.points === 4 ? .38 : .42);
      drawStar(
        s.x * canvas.width,
        s.y * canvas.height,
        s.points, s.size, inner,
        s.rotate, s.color, pulse
      );
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

    // Interpolate hex colors
    const ah = parseInt(a.replace('#',''), 16);
    const bh = parseInt(b.replace('#',''), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab2 = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg2 = (bh >> 8) & 0xff, bb2 = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg2 - ag) * t);
    const b3 = Math.round(ab2 + (bb2 - ab2) * t);
    return '#' + [r,g,b3].map(x => x.toString(16).padStart(2,'0')).join('');
  }

  function getSkyNow() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const t = m / 60; // fractional progress through the hour
    const h2 = (h + 1) % 24;
    const s1 = SKY[h] || SKY[0];
    const s2 = SKY[h2] || SKY[0];
    return { s1, s2, t };
  }

  function applySky() {
    const { s1, s2, t } = getSkyNow();
    document.body.style.background = interpolate(s1.bg, s2.bg, t);

    // Update body::before via a style element
    let styleEl = document.getElementById('skyStyle');
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'skyStyle';
      document.head.appendChild(styleEl);
    }

    styleEl.textContent = `
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 70% 50% at 15% 20%, ${s1.b1} 0%, transparent 70%),
          radial-gradient(ellipse 60% 60% at 85% 10%, ${s1.b2} 0%, transparent 65%),
          radial-gradient(ellipse 80% 50% at 50% 90%, ${s1.b3} 0%, transparent 70%),
          radial-gradient(ellipse 50% 40% at 90% 70%, ${s1.b4} 0%, transparent 60%);
        transition: all 60s linear;
      }
    `;

    // Update header gradient
    const [hc1, hc2] = s1.header.split(',');
    const [hc3, hc4] = s2.header.split(',');
    const hFrom = interpolate(hc1, hc3, t);
    const hTo   = interpolate(hc2, hc4, t);
    const header = document.querySelector('header');
    if (header) {
      header.style.background = `linear-gradient(120deg, ${hFrom} 0%, ${interpolate(hFrom,hTo,.45)} 45%, ${hTo} 75%, ${interpolate(hTo,'#FFE566',.3)} 100%)`;
    }

    // Adjust text color for dark hours
    const h = new Date().getHours();
    const isDark = h < 7 || h >= 20;
    document.body.style.color = isDark ? '#F5E6D0' : '#2D1B00';
    document.querySelectorAll('.card').forEach(c => {
      c.style.background = isDark ? 'rgba(30,20,15,.85)' : '#fff';
      c.style.borderColor = isDark ? 'rgba(245,166,35,.2)' : '#F0DFC0';
      c.style.color = isDark ? '#F5E6D0' : '#2D1B00';
    });
  }

  applySky();
  // Update every minute
  setInterval(applySky, 60000);
})();

</script>
</body>
</html>
